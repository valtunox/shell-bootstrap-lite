
services:
  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "$${GRAFANA_PORT:-3003}:3003"
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_USER=$${ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=$${ADMIN_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=$${GF_SERVER_ROOT_URL:-http://localhost:3003}
      - GF_USERS_ALLOW_SIGN_UP=$${GF_USERS_ALLOW_SIGN_UP:-false}
      - GF_INSTALL_PLUGINS=$${GF_INSTALL_PLUGINS:-}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning
      - ./dashboards:/var/lib/grafana/dashboards
    networks:
      - grafana-net
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '$${GRAFANA_CPU_LIMIT:-2.0}'
    #       memory: $${GRAFANA_MEMORY_LIMIT:-1G}
    #     reservations:
    #       cpus: '$${GRAFANA_CPU_RESERVATION:-0.5}'
    #       memory: $${GRAFANA_MEMORY_RESERVATION:-512M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  grafana-data:

networks:
  grafana-net:
    driver: bridge
